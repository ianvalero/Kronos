version: '3.8'

services:

  api:
    image: ${NEXUS_REGISTRY}/gulax-api:latest
    ports:
      - "9070:9000"
    networks:
      - gulax-network
      - ai-network
    env_file:
      - .env
    volumes:
      - files_data:/files
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 9000"
    deploy:
      restart_policy:
        condition: any

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRESQL_USER}
      POSTGRES_PASSWORD: ${POSTGRESQL_PASSWORD}
      POSTGRES_DB: ${POSTGRESQL_DB:-gulax}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - gulax-network
    deploy:
      restart_policy:
        condition: any

  redis:
    image: redis:7.4-alpine
    ports:
      - "6380:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    networks:
      - gulax-network
    command:
      - sh
      - -c
      - redis-server --appendonly yes --save "" --requirepass "$REDIS_PASSWORD"
    deploy:
      restart_policy:
        condition: any

  celery-worker:
    image: ${NEXUS_REGISTRY}/gulax-api:latest
    networks:
      - gulax-network
      - ai-network
    env_file:
      - .env
    volumes:
      - files_data:/files
    command: celery -A app.celery_workers.celery_app worker --loglevel=info
    deploy:
      restart_policy:
        condition: any

volumes:
  postgres_data:
  redis_data:
  files_data:

networks:
  gulax-network:
  ai-network:
    external: true