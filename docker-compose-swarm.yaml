version: '3.8'

services:

  gulax-api:
    image: ${NEXUS_REGISTRY}/gulax-api:latest
    ports:
      - "9060:9010"
    networks:
      - ia_ai-network
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"
    deploy:
      restart_policy:
        condition: any

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-gulax}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ia_ai-network
    deploy:
      restart_policy:
        condition: any

  redis:
    image: redis:7.4-alpine
    ports:
      - "6380:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    env_file:
      - .env
    volumes:
      - redis_data:/data
    depends_on:
      - postgres
    networks:
      - ia_ai-network
    command:
      - sh
      - -c
      - redis-server --appendonly yes --save "" --requirepass "$REDIS_PASSWORD"
    deploy:
      restart_policy:
        condition: any

  celery-worker:
    image: ${NEXUS_REGISTRY}/gulax-api:latest
    networks:
      - ia_ai-network
    depends_on:
      - postgres
    env_file:
      - .env
    command: celery -A app.celery_workers.celery_app worker --loglevel=info
    deploy:
      restart_policy:
        condition: any

volumes:
  postgres_data:
  redis_data:

networks:
  ia_ai-network:
    external: true
    name: ia-backend_ai-network